[workspace]
members = [
    "conformance",
    "ferricel",
    "ferricel-core",
    "ferricel-types",
    "runtime",
]
resolver = "2"

[workspace.dependencies]
anyhow       = "1.0"
assert_cmd   = "2.1"
base64       = "0.22"
bytes        = "1"
cel          = "0.12"
chrono       = { version = "0.4", default-features = false, features = ["alloc", "serde"] }
chrono-tz    = "0.10"
clap         = { version = "4.5", features = ["derive"] }
nom          = "7.1"
once_cell    = "1.19"
predicates   = "3.1"
prost        = "0.14"
prost-build  = "0.14"
prost-types  = "0.14"
rayon        = "1.10"
regex-lite   = "0.1"
rstest       = "0.26"
serde        = { version = "1.0", features = ["derive"] }
serde_bytes  = "0.11"
serde_json   = "1.0"
slog         = "2.8"
slog-term    = "2.9"
tempfile     = "3.25"
walrus       = "0.25"
wasmtime     = "42.0"
