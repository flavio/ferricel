[workspace]
members = [
    "conformance",
    "example",
    "ferricel",
    "ferricel-core",
    "ferricel-types",
    "runtime",
]
resolver = "2"

[workspace.dependencies]
anyhow     = "1.0"
rstest     = "0.26"
serde      = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
slog       = "2.8"
