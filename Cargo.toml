[workspace]
members = [
  "conformance",
  "ferricel",
  "ferricel-core",
  "ferricel-types",
  "runtime",
]
resolver = "2"

[workspace.dependencies]
anyhow      = "1.0"
base64      = "0.22"
prost       = "0.14"
prost-types = "0.14"
rstest      = "0.26"
serde       = { version = "1.0", features = ["derive"] }
serde_json  = "1.0"
slog        = "2.8"
slog-term   = "2.9"
