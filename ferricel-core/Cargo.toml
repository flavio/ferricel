[package]
edition = "2024"
name    = "ferricel-core"
version = "0.1.0"
build   = "build.rs"
include = [
    "src/**/*",
    "build.rs",
    "Cargo.toml",
    # Pre-built runtime WASM, placed here by `make publish-prep` before publishing.
    # Not tracked in git (covered by the workspace .gitignore `*.wasm` rule).
    "runtime.wasm",
]

[dependencies]
anyhow         = { workspace = true }
cel            = "0.13"
ferricel-types = { path = "../ferricel-types" }
prost          = { workspace = true }
prost-types    = { workspace = true }
serde_json     = { workspace = true }
slog           = { workspace = true }
walrus         = "0.26"
wasmtime       = "43.0"

[dev-dependencies]
rstest    = { workspace = true }
slog-term = { workspace = true }
