name: Bump taplo to latest GitHub release

scms:
  ferricel:
    kind: github
    spec:
      owner: "flavio"
      repository: "ferricel"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GITHUB_USERNAME" }}'
      branch: "main"

sources:
  taplo-release:
    name: Get latest taplo GitHub release
    kind: githubRelease
    spec:
      owner: "tamasfe"
      repository: "taplo"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver

  taplo-checksum:
    name: Get sha256 checksum for taplo linux x86_64
    kind: shell
    dependson:
      - taplo-release
    spec:
      command: >-
        curl -sL
        "https://github.com/tamasfe/taplo/releases/download/{{ source "taplo-release" }}/taplo-linux-x86_64.gz"
        | sha256sum | awk '{print $1}'

targets:
  update-version:
    name: Update TAPLO_VERSION in CI workflow
    kind: yaml
    scmid: ferricel
    sourceid: taplo-release
    spec:
      file: .github/workflows/ci.yml
      key: $.env.TAPLO_VERSION

  update-checksum:
    name: Update TAPLO_CHECKSUM in CI workflow
    kind: yaml
    scmid: ferricel
    sourceid: taplo-checksum
    spec:
      file: .github/workflows/ci.yml
      key: $.jobs.lint.steps[3].env.TAPLO_CHECKSUM

actions:
  default:
    kind: github/pullrequest
    scmid: ferricel
    title: 'Bump taplo to {{ source "taplo-release" }}'
    spec:
      labels:
        - "dependencies"
