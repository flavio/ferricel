name: Bump mdbook to latest GitHub release

scms:
  ferricel:
    kind: github
    spec:
      owner: "flavio"
      repository: "ferricel"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GITHUB_USERNAME" }}'
      branch: "main"

sources:
  mdbook-release:
    name: Get latest mdbook GitHub release
    kind: githubRelease
    spec:
      owner: "rust-lang"
      repository: "mdBook"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver

  mdbook-checksum:
    name: Get sha256 checksum for mdbook linux x86_64
    kind: shell
    dependson:
      - mdbook-release
    spec:
      command: >-
        curl -sL
        "https://github.com/rust-lang/mdBook/releases/download/{{ source "mdbook-release" }}/mdbook-{{ source "mdbook-release" }}-x86_64-unknown-linux-gnu.tar.gz"
        | sha256sum | awk '{print $1}'

targets:
  update-version:
    name: Update MDBOOK_VERSION in mdbook-pages workflow
    kind: yaml
    scmid: ferricel
    sourceid: mdbook-release
    transformers:
      - trimprefix: "v"
    spec:
      file: .github/workflows/mdbook-pages.yml
      key: $.env.MDBOOK_VERSION

  update-checksum:
    name: Update MDBOOK_CHECKSUM in mdbook-pages workflow
    kind: yaml
    scmid: ferricel
    sourceid: mdbook-checksum
    spec:
      file: .github/workflows/mdbook-pages.yml
      key: $.jobs.build-and-publish.steps[1].env.MDBOOK_CHECKSUM

actions:
  default:
    kind: github/pullrequest
    scmid: ferricel
    title: 'Bump mdbook to {{ source "mdbook-release" }}'
    spec:
      labels:
        - "dependencies"
