name: Updatecli

on:
  schedule:
    # Run once a day at 08:00 UTC
    - cron: "0 8 * * *"
  # Allow manual runs from the GitHub UI
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  updatecli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
          persist-credentials: false

      - name: Install Updatecli
        uses: updatecli/updatecli-action@5bda7da77bf4d181bce5f807d73d832b62062acf # v3.3.0

      - name: Run Updatecli
        run: updatecli pipeline apply --config updatecli/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATECLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATECLI_GITHUB_USERNAME: ${{ github.actor }}
