name: Publish Docs (mdBook)

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/mdbook-pages.yml"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Read mdbook version
        id: mdbook-version
        run: |
          echo "version=$(grep '^version:' mdbook-version.yaml | awk '{print $2}' | tr -d '\"')" >> "$GITHUB_OUTPUT"
          echo "checksum=$(grep '^checksum:' mdbook-version.yaml | awk '{print $2}' | tr -d '\"')" >> "$GITHUB_OUTPUT"

      - name: Install mdbook
        run: |
          set -e
          curl -sSL -o mdbook.tar.gz "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          echo "$MDBOOK_CHECKSUM  mdbook.tar.gz" | sha256sum -c
          tar -xzf mdbook.tar.gz --directory=/usr/local/bin
        env:
          MDBOOK_VERSION: ${{ steps.mdbook-version.outputs.version }}
          MDBOOK_CHECKSUM: ${{ steps.mdbook-version.outputs.checksum }}

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build docs
        run: mdbook build docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/book/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
