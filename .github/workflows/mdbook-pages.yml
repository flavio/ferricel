name: Publish Docs (mdBook)

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/mdbook-pages.yml"

env:
  MDBOOK_VERSION: "0.5.2"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install mdbook
        run: |
          set -e
          curl -sSL -o mdbook.tar.gz "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          echo "$MDBOOK_CHECKSUM  mdbook.tar.gz" | sha256sum -c
          tar -xzf mdbook.tar.gz --directory=/usr/local/bin
        env:
          MDBOOK_CHECKSUM: "084e4342ba564db270108763e404a7d1f309d932651a22484e93c0dc1a071f6d"

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Build docs
        run: mdbook build docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs/book/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
