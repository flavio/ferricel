name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      fast:
        description: "Skip slow jobs (integration-tests, conformance)"
        required: false
        type: boolean
        default: false

permissions: {}

env:
  TAPLO_VERSION: "0.10.0"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt --no-self-update
      - name: Install taplo
        run: |
          set -e
          curl -sSL -o taplo-linux-x86_64.gz "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VERSION}/taplo-linux-x86_64.gz"
          echo "$TAPLO_CHECKSUM  taplo-linux-x86_64.gz" | sha256sum -c
          gunzip taplo-linux-x86_64.gz
          sudo mv taplo-linux-x86_64 /usr/local/bin/taplo
          sudo chmod +x /usr/local/bin/taplo
        env:
          TAPLO_CHECKSUM: "8fe196b894ccf9072f98d4e1013a180306e17d244830b03986ee5e8eabeb6156"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run linter
        run: make lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run unit tests
        run: make unit-tests

  integration-tests:
    name: Integration Tests
    if: ${{ !inputs.fast }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run integration tests
        run: make integration-tests

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run end-to-end tests
        run: make e2e-tests

  generate-conformance-matrix:
    name: Generate Conformance Matrix
    if: ${{ !inputs.fast }}
    runs-on: ubuntu-latest
    outputs:
      suites: ${{ steps.matrix.outputs.suites }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Generate matrix from Makefile
        id: matrix
        run: |
          suites=$(make conformance-list \
            | grep -oP '(?<=conformance-)\S+' \
            | grep -v -e '^all$' -e '^list$' \
            | jq -Rcs '[split("\n") | .[] | select(length > 0)]')
          echo "suites=$suites" >> "$GITHUB_OUTPUT"

  conformance:
    name: Conformance (${{ matrix.suite }})
    if: ${{ !inputs.fast }}
    runs-on: ubuntu-latest
    needs: generate-conformance-matrix
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.generate-conformance-matrix.outputs.suites) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: conformance
      - name: Run conformance suite
        run: make conformance-${MATRIX_SUITE}
        env:
          MATRIX_SUITE: ${{ matrix.suite }}
