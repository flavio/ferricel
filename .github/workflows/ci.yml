name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run linter
        run: make lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run unit tests
        run: make unit-tests

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run integration tests
        run: make integration-tests

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run end-to-end tests
        run: make e2e-tests

  generate-conformance-matrix:
    name: Generate Conformance Matrix
    runs-on: ubuntu-latest
    outputs:
      suites: ${{ steps.matrix.outputs.suites }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Generate matrix from Makefile
        id: matrix
        run: |
          suites=$(make conformance-list \
            | grep -oP '(?<=conformance-)\S+' \
            | grep -v -e '^all$' -e '^list$' \
            | jq -Rcs '[split("\n") | .[] | select(length > 0)]')
          echo "suites=$suites" >> "$GITHUB_OUTPUT"

  conformance:
    name: Conformance (${{ matrix.suite }})
    runs-on: ubuntu-latest
    needs: generate-conformance-matrix
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.generate-conformance-matrix.outputs.suites) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
          persist-credentials: false
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: conformance
      - name: Run conformance suite
        run: make conformance-${MATRIX_SUITE}
        env:
          MATRIX_SUITE: ${{ matrix.suite }}
