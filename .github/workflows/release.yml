name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions: {}
    with:
      fast: true

  build-ferricel-cli:
    name: Build ferricel CLI binaries
    needs:
      - ci
    uses: ./.github/workflows/build-ferricel-cli.yml
    permissions:
      contents: read
      id-token: write
      attestations: write

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs:
      - ci
      - build-ferricel-cli
    permissions:
      contents: write
    steps:
      - name: Retrieve tag name
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GIT_REF_NAME: ${{ github.ref_name }}
        run: |
          echo "TAG_NAME=$GIT_REF_NAME" >> $GITHUB_ENV

      - name: Get release ID from the release created by release drafter
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            let releases = await github.rest.repos.listReleases({
               owner: context.repo.owner,
               repo: context.repo.repo,
            });
            for (const release of releases.data) {
              if (release.draft) {
                      core.info(release)
                      core.exportVariable('RELEASE_ID', release.id)
                      return
              }
            }
            core.setFailed(`Draft release not found`)

      - name: Download ferricel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ferricel-*
          merge-multiple: false

      - name: Upload release assets
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            let fs = require('fs');
            let path = require('path');

            let files = [
              './ferricel-linux-x86_64/ferricel-linux-x86_64.zip',
              './ferricel-linux-x86_64-sbom/ferricel-linux-x86_64-sbom.spdx',
              './ferricel-linux-x86_64-sbom/ferricel-linux-x86_64-sbom.spdx.bundle.sigstore',
              './ferricel-linux-aarch64/ferricel-linux-aarch64.zip',
              './ferricel-linux-aarch64-sbom/ferricel-linux-aarch64-sbom.spdx',
              './ferricel-linux-aarch64-sbom/ferricel-linux-aarch64-sbom.spdx.bundle.sigstore',
              './ferricel-darwin-x86_64/ferricel-darwin-x86_64.zip',
              './ferricel-darwin-x86_64-sbom/ferricel-darwin-x86_64-sbom.spdx',
              './ferricel-darwin-x86_64-sbom/ferricel-darwin-x86_64-sbom.spdx.bundle.sigstore',
              './ferricel-darwin-aarch64/ferricel-darwin-aarch64.zip',
              './ferricel-darwin-aarch64-sbom/ferricel-darwin-aarch64-sbom.spdx',
              './ferricel-darwin-aarch64-sbom/ferricel-darwin-aarch64-sbom.spdx.bundle.sigstore',
              './ferricel-windows-x86_64/ferricel-windows-x86_64.exe.zip',
              './ferricel-windows-x86_64-sbom/ferricel-windows-x86_64-sbom.spdx',
              './ferricel-windows-x86_64-sbom/ferricel-windows-x86_64-sbom.spdx.bundle.sigstore',
            ];
            const {RELEASE_ID} = process.env

            for (const file of files) {
              let file_data = fs.readFileSync(file);

              let response = await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: `${RELEASE_ID}`,
                name: path.basename(file),
                data: file_data,
              });
            }

      - name: Publish release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const {RELEASE_ID} = process.env
            const {TAG_NAME} = process.env
            isPreRelease = ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: `${RELEASE_ID}`,
              draft: false,
              tag_name: `${TAG_NAME}`,
              name: `${TAG_NAME}`,
              prerelease: isPreRelease,
              make_latest: !isPreRelease
            });

  publish:
    name: Publish on crates.io
    runs-on: ubuntu-latest
    needs:
      - ci
    permissions:
      id-token: write # Required for OIDC token exchange
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cargo publish -p ferricel-types
          sleep 30
          make publish-prep
          cargo publish --allow-dirty -p ferricel-core
          sleep 30
          cargo publish -p ferricel
